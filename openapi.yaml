openapi: 3.0.3
info:
  title: Game Collection API
  version: 1.0.0
  description: |
    A RESTful API for managing a video game collection and ratings.

    Note: A global rate limit of 5 requests per second is enforced and shared across all routes.
    
    429 responses include standard rate-limit headers (X-RateLimit-Limit, X-RateLimit-Remaining, X-RateLimit-Reset).
servers:
  - url: http://localhost:3000



paths:
  /games:
    get:
      summary: Get all games
      description: Returns a list of games from the collection with optional filtering and pagination.
      parameters:
        - in: query
          name: q
          schema:
            type: string
          description: Search query for matching titles (partial match). Max 50 chars.
        - in: query
          name: year
          schema:
            type: integer
          description: Year to limit results by (requires cmp parameter).
        - in: query
          name: cmp
          schema:
            type: string
            enum: [gt, lt]
          description: Comparison operator for year (gt = greater than, lt = less than).
        - in: query
          name: sort
          schema:
            type: string
          description: Column to sort by (e.g., title, release_year).
        - in: query
          name: order
          schema:
            type: string
            enum: [asc, desc]
          description: Sort order direction.
        - in: query
          name: page
          schema:
            type: integer
          description: Page number for pagination (>= 1).
        - in: query
          name: limit
          schema:
            type: integer
          description: Number of results per page (1-1000).
      responses:
        "200":
          description: A list of games.
        "400":
          description: Bad request (invalid parameters).
        "429":
          description: Exceeded set rate limit.

    post:
      summary: Create a new game
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GameInput'
      responses:
        "201":
          description: Game created successfully.
        "400":
          description: Validation error.
        "429":
          description: Exceeded set rate limit.

  /games/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
        description: The game ID
    get:
      summary: Get a game by ID
      responses:
        "200":
          description: Game details.
        "404":
          description: Game not found.
        "429":
          description: Exceeded set rate limit.
    put:
      summary: Update a game
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GameInput'
      responses:
        "200":
          description: Game updated successfully.
        "404":
          description: Game not found.
        "429":
          description: Exceeded set rate limit.
    delete:
      summary: Delete a game
      responses:
        "204":
          description: Game deleted successfully.
        "404":
          description: Game not found.
        "429":
          description: Exceeded set rate limit.

  /ratings:
    get:
      summary: Get all ratings
      description: Returns a list of ratings from the collection with optional filtering and pagination.
      parameters:
        - in: query
          name: game_id
          schema:
            type: number
          description: Searches ratings with matching game_id. Ignores all other parameters. 
        - in: query
          name: title
          schema:
            type: string
          description: Search query for matching game titles (partial match). Max 50 chars.
        - in: query
          name: rating
          schema:
            type: integer
          description: Rating to limit results by (requires cmp parameter).
        - in: query
          name: cmp
          schema:
            type: string
            enum: [gt, lt]
          description: Comparison operator for year (gt = greater than, lt = less than).
        - in: query
          name: sort
          schema:
            type: string
          description: Column to sort by (title or rating).
        - in: query
          name: order
          schema:
            type: string
            enum: [asc, desc]
          description: Sort order direction.
        - in: query
          name: page
          schema:
            type: integer
          description: Page number for pagination (>= 1).
        - in: query
          name: limit
          schema:
            type: integer
          description: Number of results per page (1-1000).

      responses:
        "200":
          description: A list of ratings.
        "400":
          description: Invalid parameter or value.
        "422":
         description: Value exceeded valid range.
        "429":
          description: Exceeded set rate limit.
    post:
      summary: Create a new rating
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - rating
              properties:
                game_id:
                  type: integer
                  description: Supersedes game_title if also provided.
                game_title:
                  type: string
                rating:
                  type: number
              oneOf: 
                - title: "game_id"
                  required: ["game_id"]
                - title: "game_title"
                  required: ["game_title"]
      responses:
        "201":
          description: Rating created successfully.
        "400":
          description: game_title or game_id doesn't match with any game.
        "422":
          description: game_title matches multiple game entries, must match only one.
        "429":
          description: Exceeded set rate limit.

  /ratings/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
    get:
      summary: Get a rating by ID
      responses:
        "200":
          description: Rating details.
        "400":
          description: Invalid rating id
        "404":
          description: Rating not found
        "429":
          description: Exceeded set rate limit.
    put:
      summary: Update a rating
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - rating
              properties:
                game_id:
                  type: integer
                  description: Supersedes game_title if also provided.
                game_title:
                  type: string
                rating:
                  type: number
              oneOf: 
                - title: "game_id"
                  required: ["game_id"]
                - title: "game_title"
                  required: ["game_title"]
      responses:
        "200":
          description: Rating updated.
        "400":
          description: Invalid value for rating is passed. Exceeds range.
        "404":
          description: Rating id not found.
        "422":
          description: game_title matches multiple game entries, must match only one.
        "429":
          description: Exceeded set rate limit.
    delete:
      summary: Delete a rating
      responses:
        "204":
          description: Rating deleted successfully.
        "404":
          description: Rating id not found.
        "429":
          description: Exceeded set rate limit.
  /genres:
    get:
      summary: Get all genres
      responses:
        "200":
          description: A list of genres.
        "429":
          description: Exceeded set rate limit.
    post:
      summary: Create a new genre
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - genre
              properties:
                genre:
                  type: string
                  example: "Metroidvania"
      responses:
        "201":
          description: Genre created successfully.
        "409":
          description: Genre already exists.
        "429":
          description: Exceeded set rate limit.

  /genres/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
    get:
      summary: Get a genre by ID
      responses:
        "200":
          description: Genre details.
        "404":
          description: Genre not found.
        "429":
          description: Exceeded set rate limit.
    put:
      summary: Update a genre
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - genre
              properties:
                genre:
                  type: string
                  example: "Action RPG"
      responses:
        "200":
          description: Genre updated successfully.
        "404":
          description: Genre not found.
        "429":
          description: Exceeded set rate limit.
    delete:
      summary: Delete a genre
      responses:
        "204":
          description: Genre deleted successfully.
        "404":
          description: Genre not found.
        "429":
          description: Exceeded set rate limit.
  
  /platforms:
    get:
      summary: Get all platforms
      description: Returns a list of platforms from the collection with optional filtering and pagination.
      parameters:
        - in: query
          name: system
          schema:
            type: string
          description: Search query for matching systems (partial match).
        - in: query
          name: company
          schema:
            type: string
          description: Search query for matching companies (partial match).
        - in: query
          name: sort
          schema:
            type: string
          description: Column to sort by (system or company).
        - in: query
          name: order
          schema:
            type: string
            enum: [asc, desc]
          description: Sort order direction.
        - in: query
          name: page
          schema:
            type: integer
          description: Page number for pagination (>= 1).
        - in: query
          name: limit
          schema:
            type: integer
          description: Number of results per page (1-1000).
      responses:
        "200":
          description: A list of platforms.
        "400":
          description: Bad request (invalid parameters).
        "429":
          description: Exceeded set rate limit.
          
    post:
      summary: Create a new platform
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - company
                - system
              properties:
                company:
                  type: string
                  example: "Nintendo"
                system:
                  type: string
                  example: "Wii"
      responses:
        "201":
          description: Platform created successfully.
        "400":
          description: Validation error.
        "429":
          description: Exceeded set rate limit.

  /platforms/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
        description: The platform ID
    get:
      summary: Get a platform by ID
      responses:
        "200":
          description: Platform details.
        "404":
          description: Platform not found.
        "429":
          description: Exceeded set rate limit.
    put:
      summary: Update a platform
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - company
                - system
              properties:
                company:
                  type: string
                  example: "Nintendo"
                system:
                  type: string
                  example: "Wii"
      responses:
        "200":
          description: Platform updated successfully.
        "404":
          description: Platform not found.
        "429":
          description: Exceeded set rate limit.
    delete:
      summary: Delete a platform
      responses:
        "204":
          description: Platform deleted successfully.
        "404":
          description: Platform not found.
        "429":
          description: Exceeded set rate limit.

components:
  schemas:
    GameInput:
      type: object
      required:
        - title
        - company
        - system
        - genre
        - release_year
        - developer
        - rating
      properties:
        title:
          type: string
          example: "Super Mario Odyssey"
        company:
          type: string
          example: "Nintendo"
        system:
          type: string
          example: "Switch"
        genre:
          type: string
          example: "Platformer"
        release_year:
          type: integer
          example: 2017
        developer:
          type: string
          example: "Nintendo EPD"
        rating:
          type: number
          example: 9.4